# W3B Smart Contracts — Foundry Configuration
# Solidity on Base (L2)

[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"                    # Latest stable Solidity
optimizer = true
optimizer_runs = 200                        # Standard for deployed contracts
via_ir = false                              # Faster compilation, enable for gas optimization
ffi = false                                 # Disable FFI for security
verbosity = 3

[profile.default.fuzz]
runs = 256                                  # Fuzz test iterations
max_test_rejects = 65536
seed = "0x1"

[profile.default.invariant]
runs = 256
depth = 15
fail_on_revert = false

# ─── CI / Production Profile ───
[profile.ci]
optimizer = true
optimizer_runs = 10000                      # More runs = smaller bytecode for production
via_ir = true                               # Enable IR pipeline for maximum optimization
fuzz = { runs = 1024 }
invariant = { runs = 512, depth = 25 }

# ─── Remappings ───
# Handled via remappings.txt

# ─── Etherscan / Basescan Verification ───
[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }

# ─── RPC Endpoints ───
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_MAINNET_RPC_URL}"
localhost = "http://127.0.0.1:8545"
